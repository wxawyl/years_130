workflows:
  ios-release:
    name: iOS Release Build
    environment:
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release clean build -derivedDataPath ../build/ios CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/Build/Products/Release-iphoneos/Runner.app
