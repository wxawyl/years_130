name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
    
    - name: Flutter Pub Get
      run: flutter pub get
    
    - name: Build iOS
      run: |
        flutter build ios --no-codesign --release
        cd build/ios/iphoneos
        mkdir -p Payload
        mv Runner.app Payload/
        zip -r live_to_130.ipa Payload/
    
    - name: Upload IPA
      uses: actions/upload-artifact@v3
      with:
        name: live_to_130_ios
        path: build/ios/iphoneos/live_to_130.ipa
